services:
  - type: web
    name: thesis-tool
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOW_LIVE_FETCH
        value: "false"
      - key: SEC_USER_AGENT
        sync: false
